</head><body>
<h1>Execute Reactor</h1>
<p>Anyone can call this. Burns EARTH, buys back, deepens LP, rebases holders.</p>
<label>Reactor Address:</label><br>
<input id="reactorAddr" placeholder="0x..." /><br><br>
<button onclick="checkStatus()">Check Status</button>
<button onclick="execute()">Execute</button>
<div id="log">Waiting...</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.umd.min.js"></script>
<script>
const REACTOR_ABI = [{"inputs":[{"internalType":"address","name":"_earth","type":"address"},{"internalType":"address","name":"_pm","type":"address"},{"internalType":"address","name":"_router","type":"address"},{"internalType":"address","name":"_factory","type":"address"}],"stateMutability":"nonpayable","type":"constructor"},{"anonymous":false,"inputs":[{"indexed":false,"internalType":"uint256","name":"burned","type":"uint256"},{"indexed":false,"internalType":"uint256","name":"minted","type":"uint256"},{"indexed":false,"internalType":"uint256","name":"timestamp","type":"uint256"},{"indexed":false,"internalType":"address","name":"caller","type":"address"}],"name":"Executed","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"internalType":"uint256","name":"tokenId","type":"uint256"},{"indexed":false,"internalType":"address","name":"xToken","type":"address"},{"indexed":false,"internalType":"address","name":"poolAddr","type":"address"}],"name":"PoolAdded","type":"event"},{"inputs":[],"name":"COOLDOWN","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"uint256","name":"tokenId","type":"uint256"}],"name":"addPool","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"admin","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"earth","outputs":[{"internalType":"contract IEARTH","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"execute","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"factory","outputs":[{"internalType":"contract IUniswapV3Factory","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"lastExecute","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"","type":"address"},{"internalType":"address","name":"","type":"address"},{"internalType":"uint256","name":"","type":"uint256"},{"internalType":"bytes","name":"","type":"bytes"}],"name":"onERC721Received","outputs":[{"internalType":"bytes4","name":"","type":"bytes4"}],"stateMutability":"pure","type":"function"},{"inputs":[],"name":"pm","outputs":[{"internalType":"contract INonfungiblePositionManager","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"poolCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"pools","outputs":[{"internalType":"uint256","name":"tokenId","type":"uint256"},{"internalType":"address","name":"xToken","type":"address"},{"internalType":"bool","name":"earthIsToken0","type":"bool"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"renounceAdmin","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"router","outputs":[{"internalType":"contract ISwapRouter02","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"newAdmin","type":"address"}],"name":"transferAdmin","outputs":[],"stateMutability":"nonpayable","type":"function"}];
const EARTH_ABI = [{"inputs":[{"internalType":"uint256","name":"initialSupply","type":"uint256"}],"stateMutability":"nonpayable","type":"constructor"},{"anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"owner","type":"address"},{"indexed":true,"internalType":"address","name":"spender","type":"address"},{"indexed":false,"internalType":"uint256","name":"value","type":"uint256"}],"name":"Approval","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"account","type":"address"}],"name":"Excluded","type":"event"},{"anonymous":false,"inputs":[{"indexed":false,"internalType":"uint256","name":"newIndex","type":"uint256"},{"indexed":false,"internalType":"uint256","name":"mintAmount","type":"uint256"}],"name":"Rebase","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"from","type":"address"},{"indexed":true,"internalType":"address","name":"to","type":"address"},{"indexed":false,"internalType":"uint256","name":"value","type":"uint256"}],"name":"Transfer","type":"event"},{"inputs":[{"internalType":"address","name":"owner","type":"address"},{"internalType":"address","name":"spender","type":"address"}],"name":"allowance","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"spender","type":"address"},{"internalType":"uint256","name":"amount","type":"uint256"}],"name":"approve","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"address","name":"account","type":"address"}],"name":"balanceOf","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"uint256","name":"amount","type":"uint256"}],"name":"burn","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"decimals","outputs":[{"internalType":"uint8","name":"","type":"uint8"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"account","type":"address"}],"name":"excludeFromRebase","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"isExcluded","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"name","outputs":[{"internalType":"string","name":"","type":"string"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"reactor","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"uint256","name":"mintAmount","type":"uint256"}],"name":"rebase","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"rebaseIndex","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"_reactor","type":"address"}],"name":"setReactor","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"symbol","outputs":[{"internalType":"string","name":"","type":"string"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"totalSupply","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"to","type":"address"},{"internalType":"uint256","name":"amount","type":"uint256"}],"name":"transfer","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"address","name":"from","type":"address"},{"internalType":"address","name":"to","type":"address"},{"internalType":"uint256","name":"amount","type":"uint256"}],"name":"transferFrom","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"}];
const CHAIN_ID = "0x2105";

const log = document.getElementById('log');
function l(msg) { log.textContent += msg + '\n'; }

async function getContracts() {
  const provider = new ethers.BrowserProvider(window.ethereum);
  const net = await provider.getNetwork();
  if ('0x' + net.chainId.toString(16) !== CHAIN_ID) throw new Error('Switch to Base');
  const signer = await provider.getSigner();
  const reactorAddr = document.getElementById('reactorAddr').value.trim();
  if (!reactorAddr) throw new Error('Enter Reactor address');
  const reactor = new ethers.Contract(reactorAddr, REACTOR_ABI, signer);
  const earthAddr = await reactor.earth();
  const earth = new ethers.Contract(earthAddr, EARTH_ABI, provider);
  return { provider, signer, reactor, earth, earthAddr };
}

async function checkStatus() {
  try {
    log.textContent = '';
    const { reactor, earth, earthAddr } = await getContracts();

    const poolCount = await reactor.poolCount();
    const lastExec = await reactor.lastExecute();
    const cooldown = await reactor.COOLDOWN();
    const now = BigInt(Math.floor(Date.now() / 1000));
    const nextExec = lastExec + cooldown;
    const ready = now >= nextExec;

    l('EARTH:       ' + earthAddr);
    l('Total Supply: ' + ethers.formatEther(await earth.totalSupply()) + ' EARTH');
    l('Rebase Index: ' + (await earth.rebaseIndex()).toString());
    l('Pools:        ' + poolCount.toString());
    l('Last Execute: ' + (lastExec > 0n ? new Date(Number(lastExec) * 1000).toISOString() : 'never'));
    l('Ready:        ' + (ready ? 'YES' : 'No — wait ' + ((Number(nextExec) - Number(now)) / 60).toFixed(0) + ' min'));
  } catch(e) { l('ERROR: ' + e.message); }
}

async function execute() {
  try {
    log.textContent = '';
    const { reactor, signer } = await getContracts();
    l('Calling execute()...');
    const tx = await reactor.execute();
    l('Tx sent: ' + tx.hash);
    const receipt = await tx.wait();
    l('Confirmed! Gas used: ' + receipt.gasUsed.toString());

    // Parse events
    for (const evLog of receipt.logs) {
      try {
        const parsed = reactor.interface.parseLog(evLog);
        if (parsed && parsed.name === 'Executed') {
          l('');
          l('Burned:  ' + ethers.formatEther(parsed.args.burned) + ' EARTH');
          l('Minted:  ' + ethers.formatEther(parsed.args.minted) + ' EARTH to holders');
          l('Caller:  ' + parsed.args.caller);
        }
      } catch(_) {}
    }
    l('');
    l('Cycle complete.');
  } catch(e) { l('ERROR: ' + e.message); }
}
</script></body></html>
